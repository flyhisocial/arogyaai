<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArogyaAI — India's Healthcare Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EF;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E2DDD6;
  --border2: #D0CABC;
  --text: #1A1714;
  --text2: #6B6560;
  --text3: #9E9890;
  --teal: #0A7B5E;
  --teal-light: #E0F2EB;
  --teal-mid: #1D9E75;
  --blue: #1A5CB8;
  --blue-light: #E8F0FC;
  --amber: #B05A00;
  --amber-light: #FFF0DC;
  --coral: #C03B2A;
  --coral-light: #FDECEA;
  --purple: #5B3FBE;
  --purple-light: #EEE9FF;
  --green: #2A7A3A;
  --green-light: #E8F5EC;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
h1, h2, h3, h4 { font-family: 'Sora', sans-serif; }
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
input, textarea, select { font-family: 'DM Sans', sans-serif; }

/* ===== ROLE SELECTOR ===== */
#role-selector {
  position: fixed; inset: 0; background: linear-gradient(135deg, #0A7B5E 0%, #065C46 50%, #033D30 100%);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  animation: fadeIn 0.4s ease;
}
.role-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 48px; max-width: 600px; width: 90%; text-align: center; }
.role-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
.role-logo svg { width: 36px; height: 36px; }
.role-logo span { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 700; color: #fff; }
.role-tagline { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 36px; }
.role-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.role-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 20px 16px; color: #fff; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.role-btn:hover { background: rgba(255,255,255,0.16); transform: translateY(-2px); border-color: rgba(255,255,255,0.4); }
.role-btn .icon { width: 44px; height: 44px; background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.role-btn .label { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; }
.role-btn .sub { font-size: 11px; color: rgba(255,255,255,0.5); }

/* ===== APP SHELL ===== */
#app { display: none; flex-direction: column; height: 100vh; }
#app.active { display: flex; }

/* ===== TOP NAV ===== */
.topnav { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
.nav-logo { display: flex; align-items: center; gap: 8px; }
.nav-logo svg { width: 24px; height: 24px; }
.nav-logo span { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: var(--teal); }
.nav-role-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: var(--teal-light); color: var(--teal); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; font-family: 'Sora', sans-serif; }
.nav-switch { font-size: 12px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; transition: all 0.15s; }
.nav-switch:hover { background: var(--border); }
.nav-notif { position: relative; width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.nav-notif::after { content: '3'; position: absolute; top: -4px; right: -4px; background: var(--coral); color: #fff; font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }

/* ===== MAIN LAYOUT ===== */
.main-layout { display: flex; flex: 1; overflow: hidden; }

/* ===== SIDEBAR ===== */
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar-section { padding: 16px 12px 8px; }
.sidebar-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 13px; font-weight: 500; color: var(--text2); background: none; border: none; width: 100%; text-align: left; transition: all 0.15s; cursor: pointer; }
.nav-item svg { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--teal-light); color: var(--teal); }
.nav-item.active svg { opacity: 1; }
.nav-badge { margin-left: auto; font-size: 10px; font-weight: 600; background: var(--coral); color: #fff; padding: 2px 7px; border-radius: 20px; }
.sidebar-bottom { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }

/* ===== CONTENT ===== */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.page { display: none; animation: slideIn 0.25s ease; }
.page.active { display: block; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== COMMON COMPONENTS ===== */
.page-header { margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.page-sub { font-size: 14px; color: var(--text2); }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; box-shadow: var(--shadow); }
.stat-label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.stat-change { font-size: 12px; }
.stat-up { color: var(--green); }
.stat-down { color: var(--coral); }
.stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
.card-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.card-link { font-size: 12px; color: var(--teal); font-weight: 500; background: none; border: none; cursor: pointer; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-cols { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

.badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-coral { background: var(--coral-light); color: var(--coral); }
.badge-teal { background: var(--teal-light); color: var(--teal); }
.badge-purple { background: var(--purple-light); color: var(--purple); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px 10px; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); }

/* Avatar */
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'Sora', sans-serif; flex-shrink: 0; }

/* Btn */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; border: none; transition: all 0.15s; }
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: #096A50; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* Input */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; transition: border 0.15s; }
.form-input:focus { border-color: var(--teal-mid); }
.form-textarea { resize: vertical; min-height: 80px; }
select.form-input { appearance: none; }

/* ===== AI CHAT ===== */
.chat-container { display: flex; flex-direction: column; height: calc(100vh - 110px); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 16px; }
.chat-msg { display: flex; gap: 12px; max-width: 75%; }
.chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
.chat-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
.chat-msg.ai .chat-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px 16px 16px 16px; }
.chat-msg.user .chat-bubble { background: var(--teal); color: #fff; border-radius: 16px 4px 16px 16px; }
.chat-ai-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--teal); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chat-typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
.chat-input-area { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; gap: 10px; align-items: flex-end; }
.chat-input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; resize: none; max-height: 100px; font-family: 'DM Sans', sans-serif; color: var(--text); }
.chat-actions { display: flex; gap: 8px; align-items: center; }
.upload-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text2); transition: all 0.15s; }
.upload-btn:hover { background: var(--teal-light); color: var(--teal); border-color: var(--teal-mid); }
.send-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--teal); border: none; display: flex; align-items: center; justify-content: center; color: #fff; transition: all 0.15s; }
.send-btn:hover { background: #096A50; }

/* Upload zones */
.upload-zone { border: 2px dashed var(--border2); border-radius: 12px; padding: 28px; text-align: center; transition: all 0.2s; cursor: pointer; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--teal-mid); background: var(--teal-light); }
.upload-zone p { font-size: 13px; color: var(--text2); margin-top: 8px; }
.file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.file-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); font-size: 13px; }
.file-item-icon { font-size: 20px; }
.file-item-name { flex: 1; color: var(--text); font-weight: 500; }
.file-item-size { color: var(--text3); font-size: 11px; }
.file-item-badge { }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px; padding: 28px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slideIn 0.2s ease; }
.modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: none; border-radius: 8px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text2); cursor: pointer; }
.modal { position: relative; }

/* Chart bar */
.mini-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* Prescription card */
.rx-card { background: linear-gradient(135deg, #F0FAF5 0%, #E6F7EF 100%); border: 1px solid #B8E8D0; border-radius: 14px; padding: 20px; }
.rx-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed #B8E8D0; }
.rx-badge { background: var(--teal); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.05em; }
.rx-drug { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; }
.rx-drug:last-child { border-bottom: none; }
.rx-drug-name { font-weight: 500; }
.rx-drug-dose { color: var(--text2); font-size: 12px; }

/* Timeline */
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item { display: flex; gap: 14px; padding-bottom: 16px; position: relative; }
.timeline-item::before { content: ''; position: absolute; left: 15px; top: 32px; width: 1px; height: calc(100% - 16px); background: var(--border); }
.timeline-item:last-child::before { display: none; }
.timeline-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; border: 2px solid var(--surface); }
.timeline-content { flex: 1; padding-top: 4px; }
.timeline-title { font-size: 13px; font-weight: 500; color: var(--text); }
.timeline-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Progress ring */
.progress-wrap { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
.tab-btn { flex: 1; padding: 8px; border: none; border-radius: 7px; background: transparent; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

/* Health metric */
.health-metric { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.health-metric:last-child { border-bottom: none; }
.metric-name { font-size: 13px; color: var(--text2); }
.metric-val { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'Sora', sans-serif; }
.metric-status { }

/* Admin chart */
.chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar-col { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.5s ease; cursor: pointer; }
.chart-bar-col:hover { opacity: 0.8; }
.chart-bar-label { font-size: 10px; color: var(--text3); }

/* Doctor quick action */
.quick-action { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all 0.15s; font-size: 13px; font-weight: 500; }
.quick-action:hover { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal); }
.quick-action-icon { font-size: 18px; }

/* Video call UI */
.video-card { background: #1A1714; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; position: relative; }
.video-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 28px; font-family: 'Sora', sans-serif; font-weight: 700; color: #fff; }
.video-label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 6px; }
.video-controls { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
.video-ctrl { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: none; cursor: pointer; transition: all 0.15s; }
.video-ctrl-red { background: var(--coral-light); color: var(--coral); }
.video-ctrl-red:hover { background: var(--coral); color: #fff; }
.video-ctrl-default { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.video-ctrl-default:hover { background: var(--border); }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(34,197,94,0); } }
</style>

<script src="api.js"></script>
</head>
<body>

<!-- ROLE SELECTOR -->
<div id="role-selector">
  <div class="role-card">
    <div class="role-logo">
      <svg viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="rgba(255,255,255,0.2)"/><path d="M18 8v8M14 12h8M11 20c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><circle cx="18" cy="20" r="3" fill="#fff"/></svg>
      <span>ArogyaAI</span>
    </div>
    <p class="role-tagline">India's AI-powered healthcare platform</p>
    <div class="role-options">
      <button class="role-btn" onclick="switchRole('admin')">
        <div class="icon">🏥</div>
        <div class="label">Admin</div>
        <div class="sub">Platform overview</div>
      </button>
      <button class="role-btn" onclick="switchRole('doctor')">
        <div class="icon">👨‍⚕️</div>
        <div class="label">Doctor</div>
        <div class="sub">Manage patients</div>
      </button>
      <button class="role-btn" onclick="switchRole('patient')">
        <div class="icon">🧑‍💼</div>
        <div class="label">Patient</div>
        <div class="sub">My health portal</div>
      </button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">
  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="7" fill="#0A7B5E"/><path d="M12 5v6M9 8h6M7 14c0 2.76 2.24 5 5 5s5-2.24 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="14" r="2" fill="#fff"/></svg>
      <span>ArogyaAI</span>
    </div>
    <span class="nav-role-badge" id="role-badge">Admin</span>
    <div class="nav-right">
      <div class="nav-notif">🔔</div>
      <button class="nav-switch" onclick="showRoleSelector()">Switch Role</button><button class="nav-switch" onclick="handleLogout()" style="color:var(--coral)">Sign Out</button>
      <div class="nav-avatar" id="nav-avatar">A</div>
    </div>
  </nav>

  <div class="main-layout">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- CONTENT -->
    <main class="content" id="content"></main>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ===== STATE =====
let currentRole = 'patient';
let currentPage = '';
let chatHistory = [];
let uploadedFiles = [];

// ===== ROLE CONFIG =====
const roles = {
  admin: {
    badge: 'Admin Dashboard',
    avatar: 'A',
    nav: [
      { section: 'Overview', items: [
        { id: 'admin-dashboard', label: 'Dashboard', icon: dashIcon() },
        { id: 'admin-consultations', label: 'Consultations', icon: videoIcon(), badge: '12' },
        { id: 'admin-revenue', label: 'Revenue', icon: chartIcon() },

// ===== ROLE SWITCH =====
function switchRole(role) {
  currentRole = role;
  document.getElementById('role-selector').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('role-badge').textContent = roles[role].badge;
  document.getElementById('nav-avatar').textContent = roles[role].avatar;
  renderSidebar();
  const firstItem = roles[role].nav[0].items[0];
  navigate(firstItem.id);
}

function showRoleSelector() {
  document.getElementById('role-selector').style.display = 'flex';
  document.getElementById('app').classList.remove('active');
}

// ===== SIDEBAR =====
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const cfg = roles[currentRole].nav;
  let html = '';
  cfg.forEach(section => {
    html += `<div class="sidebar-section"><div class="sidebar-section-label">${section.section}</div>`;
    section.items.forEach(item => {
      const badgeHtml = item.badge ? `<span class="nav-badge">${item.badge}</span>` : '';
      html += `<button class="nav-item" id="nav-${item.id}" onclick="navigate('${item.id}')">${item.icon}${item.label}${badgeHtml}</button>`;
    });
    html += `</div>`;
  });
  sidebar.innerHTML = html;
}

// ===== NAVIGATE =====
function navigate(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${pageId}`);
  if (navEl) navEl.classList.add('active');
  const content = document.getElementById('content');
  const pages = {
    'admin-dashboard': adminDashboard,
    'admin-consultations': adminConsultations,
    'admin-revenue': adminRevenue,
    'admin-doctors': adminDoctors,
    'admin-patients': adminPatients,
    'admin-reports': adminReports,
    'admin-settings': adminSettings,
    'doctor-dashboard': doctorDashboard,
    'doctor-appointments': doctorAppointments,
    'doctor-teleconsult': teleconsult,
    'doctor-patients': doctorPatients,
    'doctor-prescriptions': doctorPrescriptions,
    'doctor-reports': doctorReports,
    'doctor-schedule': doctorSchedule,
    'patient-dashboard': patientDashboard,
    'patient-ai': patientAI,
    'patient-appointments': patientAppointments,
    'patient-teleconsult': teleconsult,
    'patient-prescriptions': patientPrescriptions,
    'patient-reports': patientReports,
    'patient-history': patientHistory,
  };
  if (pages[pageId]) {
    content.innerHTML = pages[pageId]();
    initPage(pageId);
  }
}

function initPage(pageId) {
  if (pageId === 'patient-ai') initChat();
  if (pageId === 'patient-reports' || pageId === 'doctor-reports') initUpload();
  if (pageId.includes('teleconsult')) initTeleconsult();
}

function quickSend(text) {

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg(text, 'user');
  showTyping();

  // Try backend proxy first (handles auth + logging), fallback to direct
  if (AROGYAAI.isLoggedIn()) {
    try {
      const r = await AROGYAAI.aiChat(text, 'English', chatHistory.slice(-6));
      removeTyping();
      if (r.ok) { addMsg(r.data.reply, 'ai'); chatHistory.push({role:'user',content:text},{role:'assistant',content:r.data.reply}); return; }
    } catch(e) { /* fallback below */ }
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are ArogyaAI, an intelligent health assistant built for Indian patients. You speak in a warm, empathetic tone. You help with: symptom assessment, health advice, recommending the right specialist, and helping book appointments. Patient profile: Name: Rahul Kumar, Age: 34, City: Chennai, India. Known conditions: mild hypertension (borderline). Known allergy: Penicillin. Always:
1. Be empathetic and clear
2. Give practical Indian-context advice
3. Suggest doctor names from: Dr. Priya Sharma (Gen. Medicine), Dr. Arun Mehta (Cardiology), Dr. Kavya Nair (Dermatology), Dr. Raj Singh (Pediatrics)
4. Always add disclaimer: "This is AI guidance, not a medical diagnosis. Please consult a doctor."
5. Use bullet points for clarity
6. Mention emergency numbers (108) when symptoms are serious
7. Keep responses concise but thorough`,
        messages: [{ role: 'user', content: text }]
      })
    });

    removeTyping();
    if (response.ok) {
      const data = await response.json();
      const reply = data.content[0].text;
      addMsg(reply, 'ai');
    } else {
      const lc = text.toLowerCase();
      let reply = aiResponses.default[Math.floor(Math.random()*3)];
      if (lc.includes('fever')) reply = aiResponses.fever;
      else if (lc.includes('rash') || lc.includes('skin')) reply = aiResponses.rash;
      else if (lc.includes('chest')) reply = aiResponses.chest;
      else if (lc.includes('diabetes') || lc.includes('sugar')) reply = aiResponses.diabetes;
      addMsg(reply, 'ai');
    }
  } catch(e) {
    removeTyping();
    const lc = text.toLowerCase();
    let reply = aiResponses.default[Math.floor(Math.random()*3)];
    if (lc.includes('fever')) reply = aiResponses.fever;
    else if (lc.includes('rash') || lc.includes('skin')) reply = aiResponses.rash;
    else if (lc.includes('chest')) reply = aiResponses.chest;
    else if (lc.includes('diabetes') || lc.includes('sugar')) reply = aiResponses.diabetes;
    addMsg(reply, 'ai');
  }
}

function addMsg(text, role) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const formatted = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  if (role === 'ai') {
    div.innerHTML = `<div class="chat-ai-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.38-1 1.73V7h1a7 7 0 017 7h1a1 1 0 010 2h-1v1a2 2 0 01-2 2H5a2 2 0 01-2-2v-1H2a1 1 0 010-2h1a7 7 0 017-7h1V5.73A2 2 0 0110 4a2 2 0 012-2z" fill="white"/></svg></div><div class="chat-bubble">${formatted}</div>`;
  } else {
    div.innerHTML = `<div class="chat-bubble">${formatted}</div>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg ai'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="chat-ai-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.38-1 1.73V7h1a7 7 0 017 7h1a1 1 0 010 2h-1v1a2 2 0 01-2 2H5a2 2 0 01-2-2v-1H2a1 1 0 010-2h1a7 7 0 017-7h1V5.73A2 2 0 0110 4a2 2 0 012-2z" fill="white"/></svg></div><div class="chat-bubble chat-typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg user';
  div.innerHTML = `<div class="chat-bubble">📎 Uploaded: <strong>${file.name}</strong></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(`I've received your file **${file.name}**. 📋\n\nI'm analyzing the content. For medical images and reports, Dr. Priya Sharma will be notified and will review it within 2-4 hours.\n\nWould you like me to:\n1. Book an urgent consultation to discuss the report?\n2. Add this to your health records?`, 'ai');
  }, 1800);
}

function handleReportUpload(event) {
  const files = Array.from(event.target.files || []);
  const list = document.getElementById('report-file-list');
  const btn = document.getElementById('upload-submit-btn');
  if (!list) return;
  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `<span class="file-item-icon">${f.name.endsWith('.pdf')?'📄':'🖼️'}</span><span class="file-item-name">${f.name}</span><span class="file-item-size">${(f.size/1024).toFixed(0)} KB</span><span class="badge badge-teal">Ready</span>`;
    list.appendChild(item);
  });
  if (btn) btn.style.display = 'inline-flex';
}

function submitUpload() {

  if (list) list.innerHTML = '<div style="padding:12px;text-align:center;color:var(--teal);font-size:13px">✅ Reports uploaded successfully! Your doctor will be notified.</div>';
